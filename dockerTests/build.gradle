def dockerTestTaskFromConfig = { DockerConfig config ->
    def imageName = "traveltime-solr-plugin-test_${config.imageVersion.replace('.', '_')}"
    def pluginProject = rootProject.project("${config.pluginVersion}")
    def imageString = config.imageVersion

    task("build_${imageString}", type: Exec, dependsOn: [pluginProject.tasks.shadowJar]) {
        environment "DOCKER_BUILDKIT", "1"
        environment "PROJECT_ROOT", rootProject.projectDir
        environment "SOLR_VERSION", config.imageVersion
        environment "POST_COMMAND", config.postCommand
        environment "SOLR_CORE_PATH", config.coreLibPath
        commandLine "bash", "${rootProject.projectDir}/common/src/test/resources/docker-build.sh", config.pluginVersion, imageName
    }

    task("test_${imageString}", type: Exec, dependsOn: "build_${imageString}") {
        environment "IMAGE_NAME", imageName
        environment "PROJECT_ROOT", rootProject.projectDir
        environment "POST_COMMAND", config.postCommand
        environment "CORE_LIB_PATH", config.coreLibPath
        environment "SCORE_FIELD", config.scoreField
        commandLine "bash", "${rootProject.projectDir}/common/src/test/resources/run-tests.sh"
    }
}

configure(project) {
    dockerTestConfigs().each { config ->
        dockerTestTaskFromConfig(config)
    }
}